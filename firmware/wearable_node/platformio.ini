; EMBER Wearable Node — PlatformIO config
; Flash: click the → arrow in the bottom toolbar, or Ctrl+Alt+U

[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino
monitor_speed = 115200

; If upload fails, uncomment the line below (old bootloader variant):
; board_build.variant = nanoatmega328old

lib_deps =
    nRF24/RF24 @ ^1.4.9
    mikalhart/TinyGPSPlus @ ^1.1.0
    adafruit/Adafruit MPU6050 @ ^2.2.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    adafruit/Adafruit BusIO @ ^1.16.1
